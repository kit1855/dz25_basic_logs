---
- name: Настройка web-сервера (nginx)
  hosts: web
  gather_facts: no
  become: yes
  tasks:
    - name: Установить nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Запустить и включить nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Настроить отправку access_log на log-сервер
      lineinfile:
        path: /etc/nginx/nginx.conf
        regexp: 'access_log syslog:server=192.168.56.15:514'
        line: '    access_log syslog:server=192.168.56.15:514,tag=nginx_access,severity=info combined;'
        insertafter: 'http {'
        backup: yes

    - name: Настроить отправку error_log на log-сервер (удаленно)
      lineinfile:
        path: /etc/nginx/nginx.conf
        regexp: 'error_log syslog:server=192.168.56.15:514'
        line: '    error_log syslog:server=192.168.56.15:514,tag=nginx_error;'
        insertafter: 'http {'
        backup: yes

    - name: Убедиться, что error_log пишется локально (критичные логи)
      lineinfile:
        path: /etc/nginx/nginx.conf
        regexp: 'error_log /var/log/nginx/error.log;'
        line: 'error_log /var/log/nginx/error.log;'
        insertbefore: 'http {'
        backup: yes

    - name: Проверить конфигурацию nginx
      command: nginx -t
      register: nginx_test
      changed_when: false

    - name: Перезапустить nginx если конфигурация валидна
      service:
        name: nginx
        state: restarted
      when: nginx_test.rc == 0

    - name: Установить auditd
      apt:
        name:
          - auditd
          - audispd-plugins
        state: present

    - name: Запустить и включить auditd
      service:
        name: auditd
        state: started
        enabled: yes

    - name: Создать правила аудита для конфигов nginx
      copy:
        dest: /etc/audit/rules.d/nginx.rules
        content: |
          -w /etc/nginx/nginx.conf -p wa -k nginx_conf
          -w /etc/nginx/sites-enabled/ -p wa -k nginx_conf
          -w /etc/nginx/sites-available/ -p wa -k nginx_conf
        owner: root
        group: root
        mode: '0640'

    - name: Загрузить правила аудита
      command: auditctl -R /etc/audit/rules.d/nginx.rules
      register: audit_rules
      changed_when: "'No rules' not in audit_rules.stdout"

    - name: Проверить загруженные правила аудита
      command: auditctl -l
      register: audit_list
      changed_when: false

    - name: Активировать плагин syslog для auditd
      lineinfile:
        path: /etc/audit/plugins.d/syslog.conf
        regexp: 'active = no'
        line: 'active = yes'
        backup: yes

    - name: Создать конфигурацию rsyslog для отправки audit.log
      copy:
        dest: /etc/rsyslog.d/99-audit.conf
        content: |
          module(load="imfile" PollingInterval="5")
          input(type="imfile" File="/var/log/audit/audit.log" Tag="audit" Severity="info" Facility="local7")
          if $programname == 'audit' then @@192.168.56.15:514
        owner: root
        group: root
        mode: '0644'

    - name: Перезапустить auditd и rsyslog
      service:
        name: "{{ item }}"
        state: restarted
      loop:
        - auditd
        - rsyslog

    # ❌ НЕТ удаления index.html!
    # ❌ НЕТ генерации ошибки 403!
    # ❌ НЕТ изменения конфига nginx!
    # ❌ НЕТ пауз!
    # ВСЕ ЭТО БУДЕТ В PLAY 3!

- name: Настройка log-сервера (rsyslog)
  hosts: log
  gather_facts: no
  become: yes
  tasks:
    - name: Установить rsyslog
      apt:
        name: rsyslog
        state: present
        update_cache: yes

    - name: Включить UDP и TCP прием в rsyslog
      lineinfile:
        path: /etc/rsyslog.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        backup: yes
      loop:
        - { regexp: '^#module\(load="imudp"\)', line: 'module(load="imudp")' }
        - { regexp: '^#input\(type="imudp" port="514"\)', line: 'input(type="imudp" port="514")' }
        - { regexp: '^#module\(load="imtcp"\)', line: 'module(load="imtcp")' }
        - { regexp: '^#input\(type="imtcp" port="514"\)', line: 'input(type="imtcp" port="514")' }

    - name: Добавить шаблон для удаленных логов
      lineinfile:
        path: /etc/rsyslog.conf
        line: |
          $template RemoteLogs, "/var/log/rsyslog/%HOSTNAME%/%PROGRAMNAME%.log"
          *.* ?RemoteLogs
        insertafter: '#### RULES ####'
        backup: yes

    - name: Создать директорию для логов
      file:
        path: /var/log/rsyslog/web
        state: directory
        owner: syslog
        group: adm
        mode: '0755'

    - name: Перезапустить rsyslog
      service:
        name: rsyslog
        state: restarted

    - name: Убедиться, что порт 514 открыт
      shell: ss -tln | grep ':514'
      register: port_check
      changed_when: false

- name: Интеграционные проверки (запускаются с master)
  hosts: localhost
  connection: local
  gather_facts: yes
  tasks:
    - name: Дождаться, пока web поднимется
      wait_for:
        host: 192.168.56.10
        port: 80
        timeout: 60

    - name: Сгенерировать запрос к nginx для создания access_log
      uri:
        url: http://192.168.56.10
        return_content: yes
        timeout: 10
      register: webpage
      ignore_errors: yes

    - name: Проверить, что nginx работает
      assert:
        that:
          - webpage.status == 200
        success_msg: "✅ Nginx работает"
        fail_msg: "❌ Nginx не отвечает"

    # 👇 ВСЕ ГЕНЕРАЦИИ СОБЫТИЙ ЗДЕСЬ

    - name: Сгенерировать ошибку 403 (удалить index.html)
      delegate_to: web
      become: yes
      shell: |
        mv /var/www/html/index.nginx-debian.html /var/www/ || true
      ignore_errors: yes
      changed_when: false

    - name: Сделать запрос для генерации ошибки 403
      uri:
        url: http://192.168.56.10
        return_content: yes
        timeout: 5
      register: error_page
      ignore_errors: yes

    - name: Проверить, что ошибка 403 сгенерирована
      assert:
        that:
          - error_page.status == 403
        success_msg: "✅ Ошибка 403 сгенерирована"
        fail_msg: "❌ Ожидалась ошибка 403, но получен статус {{ error_page.status }}"

    - name: Вернуть index.html на место
      delegate_to: web
      become: yes
      shell: |
        mv /var/www/index.nginx-debian.html /var/www/html/ || true
      ignore_errors: yes
      changed_when: false

    - name: Сгенерировать событие аудита (изменить конфиг nginx)
      delegate_to: web
      become: yes
      shell: |
        echo "# test audit - $(date)" >> /etc/nginx/nginx.conf
      register: audit_event
      ignore_errors: yes
      changed_when: false

    # 👇 ПАУЗА ПЕРЕД ПРОВЕРКАМИ

    - name: Подождать, пока все логи запишутся на диск
      pause:
        seconds: 15

    # 👇 ПРОВЕРКИ

    - name: Проверить access_log на log-сервере
      delegate_to: log
      become: yes
      stat:
        path: /var/log/rsyslog/web/nginx_access.log
      register: access_log

    - name: Проверить error_log на log-сервере
      delegate_to: log
      become: yes
      stat:
        path: /var/log/rsyslog/web/nginx_error.log
      register: error_log

    - name: Проверить audit.log на log-сервере
      delegate_to: log
      become: yes
      stat:
        path: /var/log/rsyslog/web/audit.log
      register: audit_log

    - name: Проверить содержимое access_log
      delegate_to: log
      become: yes
      shell: |
        grep -q 'nginx_access' /var/log/rsyslog/web/nginx_access.log
      register: access_log_content
      ignore_errors: yes
      changed_when: false

    - name: Проверить содержимое error_log
      delegate_to: log
      become: yes
      shell: |
        grep -q 'nginx_error' /var/log/rsyslog/web/nginx_error.log
      register: error_log_content
      ignore_errors: yes
      changed_when: false

    - name: Проверить содержимое audit.log
      delegate_to: log
      become: yes
      shell: |
        grep -q 'nginx_conf' /var/log/rsyslog/web/audit.log
      register: audit_log_content
      ignore_errors: yes
      changed_when: false

    - name: Установить реальные статусы проверок
      set_fact:
        nginx_status: "{{ '✅' if webpage.status == 200 else '❌' }}"
        access_log_status: "{{ '✅' if access_log.stat.exists and access_log_content.rc == 0 else '❌' }}"
        error_log_status: "{{ '✅' if error_log.stat.exists and error_log_content.rc == 0 else '❌' }}"
        audit_log_status: "{{ '✅' if audit_log.stat.exists and audit_log_content.rc == 0 else '❌' }}"

    - name: Итоговый отчет с реальными результатами
      debug:
        msg:
          - "========================================="
          - "📋 РЕЗУЛЬТАТЫ ПРОВЕРОК:"
          - "========================================="
          - "Nginx доступен: {{ nginx_status }}"
          - "Access_log доставлен: {{ access_log_status }}"
          - "Error_log доставлен: {{ error_log_status }}"
          - "Audit_log доставлен: {{ audit_log_status }}"
          - "========================================="

    - name: Финальный статус (проверяем все 4 пункта)
      fail:
        msg: "❌ Одна или несколько проверок не пройдены. Смотрите вывод выше."
      when: >
        webpage.status != 200 or
        access_log_status == '❌' or
        error_log_status == '❌' or
        audit_log_status == '❌'
      ignore_errors: yes
